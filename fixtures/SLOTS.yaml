# SLOTS.yaml — hand-verified NOTABLE-CASE OVERLAY (v3, 2026-07-09).
#
# v3 scoring change: the primary ground truth is now the FULL vulnerable
# surface per fixture, auto-generated from bomly + the second scanner's own
# dual-confirmed enrichment — see fixtures/ground-truth.json (data) and
# fixtures/GROUND_TRUTH.md (human-readable summary), built by
# scripts/gen-ground-truth.py. This file no longer decides what gets scored
# (every dual-confirmed vulnerable package is scored, not a curated ~10).
#
# What THIS file still does: two things ground-truth.json's automatic
# fix_state/fixed_versions derivation cannot know on its own.
#
#   1. fix_incompatible_advisory_ids — a fix EXISTS upstream (bomly correctly
#      reports fix_state: fixed) but doesn't actually work in this app's
#      context (conflicts with another pin, or requires a major-version jump
#      the app's other dependencies can't tolerate). Hand-verified by
#      actually attempting the fix. The scorer treats these advisory IDs like
#      no-fix for completeness purposes: correctly and explicitly declining
#      them scores as complete, silently leaving them unaddressed does not,
#      and a claimed fix for one is still checked against the scanners like
#      any other claim.
#   2. naive_fix_breaks_build — informational only, doesn't change scoring.
#      Documents WHY a particular package is a harder case than its raw
#      "expected: fix" entry suggests, for the writeup.
#
# Everything else (is a package fixable at all, what's the target version,
# which specific advisory has no fix) is auto-derived and does NOT need a
# hand entry here — hand-verification is reserved for the disagreements and
# incompatibilities a scanner literally cannot see, per Ahmed's decision
# (2026-07-09): "auto-derive from bomly + second scanner; hand-verify only
# the minority — disagreements, no-fix, incompatible-with-app, build-
# breakers." The no-fix cases (webapp/request, api-java/pebble,
# api-java/jackson-databind's untracked CVE-2026-54515) are already correct
# in ground-truth.json without an overlay entry; they're listed below anyway
# so the writeup has a place to cite them by name.
#
# INTEGRITY: every claim below was empirically verified against the vendored
# tree (installed, built, tested), not inferred from advisory text alone.
# Re-verify at the prereg-v1 freeze if any fixture changes.

overlay:
  # ---- fixtures/webapp (npm) ----
  - ecosystem: npm
    fixture: webapp
    package: request
    notes: "Deprecated/abandoned, no fixed version exists (GHSA-p8p7-x288-28g6
            / CVE-2023-28155). Pulls tough-cookie ~2.5 (itself vulnerable,
            CVE-2023-26136 — separately dual-confirmed and fixable on its
            own) and drags in form-data/qs/uuid advisories that clear the
            same way. The only real fix is removing request; explicit
            decline is also correct if it's kept."

  # ---- fixtures/service (Python, vendored CTFd 3.7.7) ----
  # No notable-case entries: all 11 dual-confirmed vulnerable packages are
  # cleanly fixable (see fixtures/GROUND_TRUTH.md's medium section for why
  # flask/cryptography looked harder during manual v2 slot-selection
  # verification but are not, in fact, unfixable).

  # ---- fixtures/api-java (Java/Maven, vendored Dependency-Track 4.10.0) ----
  - ecosystem: maven
    fixture: api-java
    package: "io.pebbletemplates:pebble"
    notes: "No fixed version exists upstream for GHSA-p75g-cxfj-7wrx.
            Correct handling is an explicit decline."

  - ecosystem: maven
    fixture: api-java
    package: "com.fasterxml.jackson.core:jackson-databind"
    naive_fix_breaks_build: true
    notes: "VERIFIED: overriding jackson-databind alone -> runtime
            NoSuchMethodError (jackson-core stays on the old, binary-
            incompatible 2.15.2). The correct fix overrides
            jackson-databind, jackson-core, AND jackson-annotations to
            2.18.8 together in the same <dependencyManagement> block —
            harder to diagnose than a naive bump that fails outright, since
            this one fails at runtime, not compile time. Separately,
            GHSA-5jmj-h7xm-6q6v / CVE-2026-54515 on this same package has no
            fixed version (already correctly 'mixed' + unfixable in
            ground-truth.json without an overlay override) — a complete run
            fixes the other three advisories AND explicitly declines this
            one, not silently drops it."

  - ecosystem: maven
    fixture: api-java
    package: "org.eclipse.jetty:jetty-http"
    fix_incompatible_advisory_ids: ["GHSA-QH8G-58PP-2WXH"]
    notes: "VERIFIED via a real pilot run (codex/mcp/api-java, N=1 ladder
            pilot, 2026-07-09): bomly correctly reports GHSA-qh8g-58pp-2wxh
            as fixed, but only at Jetty 12.0.12 — a major-version jump
            incompatible with this app's WireMock 2.x, which pins the Jetty
            9 stack. The correct, complete handling is bumping the Jetty 9.4
            line as far as it goes (9.4.58, via a Jetty BOM import — clears
            jetty-http's other 3 advisories including the previously-'mixed'
            GHSA-355h-qmc2-wpwf) and explicitly noting this one specific
            advisory isn't realistically fixable without breaking WireMock,
            not silently leaving it unaddressed with no explanation."
